name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check for changesets
        id: changesets
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -v README.md | head -1 >/dev/null; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages (consume changesets)
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          npm run version-packages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          SKIP_CHANGESET_HOOK=1 git commit -m "chore: version packages [skip ci]" || echo "No changes to commit"
          git push origin HEAD:master

      - name: Get version from package.json
        id: pkg
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PKG_NAME" version --registry=https://registry.npmjs.org/ 2>/dev/null || echo "")

          echo "pkg=$PKG_NAME published=$PUBLISHED_VERSION local=$LOCAL_VERSION"

          if [ "$PUBLISHED_VERSION" = "$LOCAL_VERSION" ]; then
            echo "Already published; skipping npm publish."
            exit 0
          fi

          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
